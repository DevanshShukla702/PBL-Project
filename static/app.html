<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CGEE™ | Predict ETA</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <style>
        :root {
            --primary: #2563EB;
            --primary-hover: #1D4ED8;
            --bg: #ffffff;
            --text-main: #111827;
            --text-muted: #6B7280;
            --border: #E5E7EB;
            --bg-light: #F9FAFB;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
            background-color: var(--bg);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden; 
        }
        a { text-decoration: none; color: inherit; }
        
        /* Navigation */
        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 16px 24px; border-bottom: 1px solid var(--border);
            background-color: var(--bg); z-index: 200; 
        }
        .logo { font-weight: 700; font-size: 20px; color: var(--primary); }
        .nav-links { display: flex; gap: 24px; margin-right: 16px;}
        .nav-links a { font-weight: 500; color: var(--text-muted); transition: color 0.2s; padding-bottom: 2px; }
        .nav-links a:hover { color: var(--text-main); }
        .nav-links a.active { color: var(--primary); border-bottom: 2px solid var(--primary); }

        /* Banner */
        #init-banner {
            display: none; background-color: #FEF3C7; color: #92400E;
            text-align: center; padding: 8px; font-size: 14px; font-weight: 500; z-index: 150;
        }

        /* Layout */
        .app-container { display: flex; flex: 1; height: calc(100vh - 61px); }

        /* Left Panel */
        .left-panel {
            width: 420px;
            background-color: var(--bg);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            z-index: 10;
        }
        
        .panel-content {
            flex: 1; overflow-y: auto; padding: 24px;
        }

        /* Top Action Bar */
        .action-bar {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px;
        }
        .section-header {
            display: flex; align-items: center; gap: 8px; font-weight: 600; font-size: 18px;
        }
        .btn-refresh {
            background: white; border: 1px solid var(--border); color: var(--text-main);
            padding: 6px 12px; border-radius: 6px; font-size: 13px; font-weight: 500;
            cursor: pointer; display: flex; align-items: center; gap: 6px; transition: 0.2s;
        }
        .btn-refresh:hover { background: var(--bg-light); border-color: #d1d5db; }

        /* Form Inputs */
        .input-group { margin-bottom: 20px; }
        .input-label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 6px; color: var(--text-main); }
        select, input {
            width: 100%; padding: 10px 12px; border: 1px solid var(--border);
            border-radius: 6px; font-family: inherit; font-size: 13px; outline: none; background: white;
        }
        select:focus, input:focus { border-color: var(--primary); }
        
        /* Time Input Row */
        .time-row { display: flex; gap: 8px; }
        .btn-now {
            background: var(--bg-light); border: 1px solid var(--border);
            border-radius: 6px; padding: 0 16px; font-size: 13px; font-weight: 600;
            cursor: pointer; transition: 0.2s; white-space: nowrap; color: var(--text-main);
        }
        .btn-now:hover { background: #E5E7EB; }
        
        .btn-predict {
            width: 100%; background-color: var(--primary); color: white; border: none;
            border-radius: 8px; height: 48px; font-weight: 600; font-size: 16px;
            cursor: pointer; transition: background 0.2s; display: flex;
            align-items: center; justify-content: center; gap: 8px; margin-top: 10px;
        }
        .btn-predict:hover:not(:disabled) { background-color: var(--primary-hover); }
        .btn-predict:disabled { opacity: 0.7; cursor: not-allowed; }

        .spinner {
            width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white; border-radius: 50%;
            animation: spin 1s linear infinite; display: none;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Map hint */
        .map-hint { font-size: 12px; color: var(--primary); font-weight: 500; margin-top: 6px; display: flex; align-items: flex-start; gap:6px;}

        /* ETA Results */
        #results-section { display: none; margin-top: 32px; padding-top: 24px; border-top: 1px solid var(--border); }
        
        /* Route Selector */
        .route-tabs { display: flex; flex-direction: column; gap: 8px; margin-bottom: 24px;}
        .route-tab {
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px 16px; border: 1px solid var(--border); border-radius: 8px;
            background: white; cursor: pointer; transition: all 0.2s;
        }
        .route-tab:hover { background: var(--bg-light); border-color: #d1d5db; }
        .route-tab.active { border: 2px solid var(--primary); background: #EFF6FF; }
        
        .rt-left { display: flex; align-items: center; gap: 12px; }
        .rt-color { width: 14px; height: 14px; border-radius: 4px; flex-shrink: 0;}
        .rt-title { font-weight: 600; font-size: 14px; color: var(--text-main);}
        .rt-subtitle { font-size: 12px; color: var(--text-muted); margin-top: 2px;}
        .rt-right { text-align: right; }
        .rt-time { font-size: 18px; font-weight: 700; color: var(--text-main); }
        .rt-inc { font-size: 11px; font-weight: 600; color: #DC2626; margin-top: 2px; display:flex; align-items:center; gap:2px; justify-content: flex-end;}

        /* Selected Route Details */
        #selected-route-details { display: none; }
        .horizon-card {
            border: 1px solid var(--border); border-radius: 8px; padding: 16px;
            margin-bottom: 12px; background-color: var(--bg-light); 
        }
        .card-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .horizon-label { font-size: 13px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px;}
        .conf-badge { padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: 600; }
        
        .eta-val { font-size: 26px; font-weight: 600; line-height: 1; margin-bottom: 4px; color: var(--text-main); }
        .eta-range { font-size: 13px; color: var(--text-muted); }

        .route-info { margin-top: 20px; }
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
        .info-item { background: white; border: 1px solid var(--border); border-radius: 8px; padding: 12px; text-align: center; }
        .info-title { font-size: 12px; color: var(--text-muted); font-weight: 500; text-transform: uppercase; margin-bottom: 4px;}
        .info-val { font-size: 16px; font-weight: 600; }

        .incident-box { padding: 14px; border-radius: 8px; margin-bottom: 16px;}
        .inc-clear { background-color: #DCFCE7; color: #15803D; border: 1px solid #BBF7D0; }
        .inc-warn { background-color: #FEF2F2; color: #B91C1C; border: 1px solid #FECACA; }
        .inc-title { font-weight: 600; font-size: 14px; margin-bottom: 4px; display:flex; align-items:center; gap:6px;}
        .inc-desc { font-size: 13px; opacity: 0.9; }

        /* Status Bar */
        .status-bar {
            padding: 14px 24px; border-top: 1px solid var(--border);
            display: flex; align-items: center; gap: 8px; font-size: 13px;
            color: var(--text-muted); background: var(--bg-light); flex-shrink: 0;
        }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background-color: #9CA3AF; }
        .status-dot.ready { background-color: #10B981; }

        /* Right Panel Map */
        .right-panel { flex: 1; position: relative; z-index: 0; }
        #map { width: 100%; height: 100%; z-index: 1; }

        /* Leaflet Popups */
        .leaflet-popup-content-wrapper { border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.15); }
        .route-popup { font-family: 'Inter', sans-serif; }
        .route-popup-title { font-weight: 700; font-size: 14px; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px;}
        .route-popup-eta { font-size: 18px; font-weight: 700; color: #111827; }
        .route-popup-sub { font-size: 12px; color: #6B7280; margin-top: 2px;}

        @media (max-width: 768px) {
            .app-container { flex-direction: column-reverse; height: auto; overflow-y: auto;}
            .left-panel { width: 100%; border-right: none; overflow-y: visible;}
            .right-panel { height: 400px; flex: none; }
        }
    </style>
</head>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Init Map
        const map = L.map('map', { zoomControl: false }).setView([12.9716, 77.5946], 12);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);
        L.control.zoom({ position: 'topleft' }).addTo(map);

        let mapLayers = [];
        let allRoutesData = [];
        let curSourceMarker = null;
        let curDestMarker = null;

        // Map Click Logic
        map.on('click', function(e) {
            const lat = e.latlng.lat;
            const lon = e.latlng.lng;

            const srcLat = document.getElementById('src-lat');
            const srcLon = document.getElementById('src-lon');
            const dstLat = document.getElementById('dst-lat');
            const dstLon = document.getElementById('dst-lon');

            if (!srcLat.value) {
                srcLat.value = lat; srcLon.value = lon;
                const opt = document.getElementById('src-custom-opt');
                opt.style.display = 'block';
                opt.value = `${lat},${lon}`;
                opt.textContent = `Fetching area name...`;
                document.getElementById('src-landmark').value = opt.value;

                fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`)
                    .then(res => res.json())
                    .then(data => {
                        const locName = data.address ? (data.address.suburb || data.address.neighbourhood || data.address.road || data.display_name.split(',')[0]) : `Selected Location`;
                        opt.textContent = `${locName} (Map)`;
                    }).catch(() => {
                        opt.textContent = `Map Selection`;
                    });

                if(curSourceMarker) map.removeLayer(curSourceMarker);
                curSourceMarker = L.circleMarker([lat, lon], {radius: 8, fillColor: '#2563EB', color: 'white', weight: 2, fillOpacity: 1, zIndexOffset: 1000}).addTo(map).bindPopup("Start").openPopup();
            } 
            else if (!dstLat.value) {
                dstLat.value = lat; dstLon.value = lon;
                const opt = document.getElementById('dst-custom-opt');
                opt.style.display = 'block';
                opt.value = `${lat},${lon}`;
                opt.textContent = `Fetching area name...`;
                document.getElementById('dst-landmark').value = opt.value;
                
                fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`)
                    .then(res => res.json())
                    .then(data => {
                        const locName = data.address ? (data.address.suburb || data.address.neighbourhood || data.address.road || data.display_name.split(',')[0]) : `Selected Location`;
                        opt.textContent = `${locName} (Map)`;
                    }).catch(() => {
                        opt.textContent = `Map Selection`;
                    });

                if(curDestMarker) map.removeLayer(curDestMarker);
                curDestMarker = L.circleMarker([lat, lon], {radius: 8, fillColor: '#10B981', color: 'white', weight: 2, fillOpacity: 1, zIndexOffset: 1000}).addTo(map).bindPopup("End").openPopup();
            }
        });

        function setNow() {
            const now = new Date();
            now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
            document.getElementById('dep-time').value = now.toISOString().slice(0,16);
        }
        setNow();

        function fillCoords(type) {
            const val = document.getElementById(`${type}-landmark`).value;
            if(val && val !== 'custom') {
                const [lat, lon] = val.split(',');
                document.getElementById(`${type}-lat`).value = lat;
                document.getElementById(`${type}-lon`).value = lon;
                
                // Hide custom option if a real landmark is selected
                document.getElementById(`${type}-custom-opt`).style.display = 'none';
                
                // Update map marker instantly
                const mkLat = parseFloat(lat);
                const mkLon = parseFloat(lon);
                
                if (type === 'src') {
                    if(curSourceMarker) map.removeLayer(curSourceMarker);
                    curSourceMarker = L.circleMarker([mkLat, mkLon], {radius: 8, fillColor: '#2563EB', color: 'white', weight: 2, fillOpacity: 1, zIndexOffset: 1000}).addTo(map).bindPopup("Start").openPopup();
                    map.setView([mkLat, mkLon], 13);
                } else {
                    if(curDestMarker) map.removeLayer(curDestMarker);
                    curDestMarker = L.circleMarker([mkLat, mkLon], {radius: 8, fillColor: '#10B981', color: 'white', weight: 2, fillOpacity: 1, zIndexOffset: 1000}).addTo(map).bindPopup("End").openPopup();
                    map.setView([mkLat, mkLon], 13);
                }
            } else if (!val) {
                document.getElementById(`${type}-lat`).value = "";
                document.getElementById(`${type}-lon`).value = "";
                // Clear marker
                if (type === 'src' && curSourceMarker) { map.removeLayer(curSourceMarker); curSourceMarker = null; }
                if (type === 'dst' && curDestMarker) { map.removeLayer(curDestMarker); curDestMarker = null; }
            }
        }

        function resetForm() {
            document.getElementById('src-landmark').value = "";
            document.getElementById('dst-landmark').value = "";
            document.getElementById('src-lat').value = "";
            document.getElementById('src-lon').value = "";
            document.getElementById('dst-lat').value = "";
            document.getElementById('dst-lon').value = "";
            document.getElementById('src-custom-opt').style.display = 'none';
            document.getElementById('dst-custom-opt').style.display = 'none';
            document.getElementById('src-custom-opt').textContent = 'Custom Map Selection';
            document.getElementById('dst-custom-opt').textContent = 'Custom Map Selection';
            document.getElementById('results-section').style.display = 'none';
            document.getElementById('selected-route-details').style.display = 'none';
            setNow();

            if(curSourceMarker) { map.removeLayer(curSourceMarker); curSourceMarker = null; }
            if(curDestMarker) { map.removeLayer(curDestMarker); curDestMarker = null; }
            mapLayers.forEach(l => map.removeLayer(l));
            mapLayers = [];
            map.setView([12.9716, 77.5946], 12);
        }

        // Engine Polling
        let engineReady = false;
        async function checkHealth() {
            try {
                const res = await fetch('/health');
                const data = await res.json();
                if (data.engine_ready) {
                    engineReady = true;
                    document.getElementById('engine-dot').classList.add('ready');
                    document.getElementById('engine-text').textContent = 'Engine ready';
                    document.getElementById('init-banner').style.display = 'none';
                } else {
                    document.getElementById('init-banner').style.display = 'block';
                    setTimeout(checkHealth, 3000);
                }
            } catch (err) {
                setTimeout(checkHealth, 3000);
            }
        }
        checkHealth();

        // Predict ETA logic
        async function predictETA() {
            const slat = parseFloat(document.getElementById('src-lat').value);
            const slon = parseFloat(document.getElementById('src-lon').value);
            const dlat = parseFloat(document.getElementById('dst-lat').value);
            const dlon = parseFloat(document.getElementById('dst-lon').value);
            const depTime = document.getElementById('dep-time').value;

            if(!slat || !slon || !dlat || !dlon) {
                alert("Please select both Source and Destination (via dropdown or map click).");
                return;
            }

            const btn = document.getElementById('predict-btn');
            const txt = document.getElementById('btn-text');
            const spin = document.getElementById('btn-spinner');
            
            btn.disabled = true;
            txt.textContent = "Computing routes...";
            spin.style.display = "block";
            document.getElementById('results-section').style.display = 'none';
            document.getElementById('selected-route-details').style.display = 'none';

            // Clear old lines
            mapLayers.forEach(l => map.removeLayer(l));
            mapLayers = [];

            try {
                let bodyData = {
                    source: {lat: slat, lon: slon},
                    destination: {lat: dlat, lon: dlon}
                };
                if(depTime) {
                    bodyData.departure_time = new Date(depTime).toISOString();
                }

                const res = await fetch('/predict-route-eta', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(bodyData)
                });
                
                const data = await res.json();
                if(!res.ok) throw new Error(data.detail?.error || data.detail || 'Prediction failed');

                allRoutesData = data.routes || [];
                if(allRoutesData.length === 0) throw new Error("No routes found.");

                // Render Map UI with darker, narrower lines
                drawMapRoutes(slat, slon, dlat, dlon, allRoutesData);
                renderRouteSelector();
                selectRoute(allRoutesData[0].route_id);

            } catch (err) {
                alert(`Error: ${err.message}`);
            } finally {
                btn.disabled = false;
                txt.textContent = "Predict ETA";
                spin.style.display = "none";
            }
        }

        // Contrast Colors: Blue (Fastest), Black (Alternate), Purple (Scenic)
        const fallbackColors = ['#2563EB', '#000000', '#9333EA'];

        function drawMapRoutes(slat, slon, dlat, dlon, routes) {
            // Ensure markers stay up
            if(!curSourceMarker) {
                curSourceMarker = L.circleMarker([slat, slon], { radius: 8, fillColor: '#2563EB', color: 'white', weight: 2, fillOpacity: 1, zIndexOffset: 1000 }).addTo(map).bindPopup("Start");
            }
            if(!curDestMarker) {
                curDestMarker = L.circleMarker([dlat, dlon], { radius: 8, fillColor: '#10B981', color: 'white', weight: 2, fillOpacity: 1, zIndexOffset: 1000 }).addTo(map).bindPopup("End");
            }

            const allPoints = [];
            
            // Render lines
            routes.forEach((route, idx) => {
                const rColor = fallbackColors[idx] || route.color || '#6B7280';
                route.renderColor = rColor; // Save for UI

                const points = route.meta.route_geometry.map(p => [p.lat, p.lon]);
                points.forEach(p => allPoints.push(p));

                const incText = route.meta.incident ? `<span style="color:#DC2626;font-weight:600">⚠ ${route.meta.incident_segments} incident zones</span>` : `<span style="color:#059669;font-weight:600">✓ Clear route</span>`;
                
                const popupHTML = `
                    <div class="route-popup">
                        <div class="route-popup-title" style="color: ${rColor}">${route.label}</div>
                        <div class="route-popup-eta">${Math.round(route.eta_minutes['1_hour'].estimate)} <span style="font-size:14px;font-weight:400">min</span></div>
                        <div class="route-popup-sub">${route.meta.distance_km} km &middot; ${incText}</div>
                    </div>
                `;

                // Main route line (Narrower, high opacity, darker color)
                const line = L.polyline(points, {
                    color: rColor, weight: 4, opacity: 0.9, lineCap: 'round'
                }).addTo(map);

                line.bindPopup(popupHTML);
                line.on('click', () => { selectRoute(route.route_id); line.openPopup(); });
                mapLayers.push(line);

                route._leafletLine = line;
            });

            if(allPoints.length > 0) {
                map.fitBounds(L.latLngBounds(allPoints), { padding: [40, 40] });
            }
        }

        function renderRouteSelector() {
            const cont = document.getElementById('route-tabs');
            let html = '';
            
            allRoutesData.forEach(route => {
                const rColor = route.renderColor;
                const incHtml = route.meta.incident 
                    ? `<span class="rt-inc"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg> ${route.meta.incident_segments}</span>` 
                    : '';

                html += `
                    <div class="route-tab" id="tab-${route.route_id}" onclick="selectRoute(${route.route_id})">
                        <div class="rt-left">
                            <div class="rt-color" style="background-color: ${rColor}"></div>
                            <div>
                                <div class="rt-title">${route.label}</div>
                                <div class="rt-subtitle">${route.meta.distance_km} km</div>
                            </div>
                        </div>
                        <div class="rt-right">
                            <div class="rt-time">${Math.round(route.eta_minutes['1_hour'].estimate)}<span style="font-size:12px;font-weight:500;margin-left:2px">m</span></div>
                            ${incHtml}
                        </div>
                    </div>
                `;
            });
            cont.innerHTML = html;
            document.getElementById('results-section').style.display = 'block';
        }

        function selectRoute(id) {
            allRoutesData.forEach(r => {
                const t = document.getElementById(`tab-${r.route_id}`);
                if(t) {
                    if(r.route_id === id) t.classList.add('active');
                    else t.classList.remove('active');
                }
                
                // Emphasize the selected route on the map
                if(r._leafletLine) {
                    if(r.route_id === id) {
                        r._leafletLine.setStyle({ weight: 6, opacity: 1.0 });
                        r._leafletLine.bringToFront();
                    } else {
                        r._leafletLine.setStyle({ weight: 4, opacity: 0.4 });
                    }
                }
            });

            if(curSourceMarker) curSourceMarker.bringToFront();
            if(curDestMarker) curDestMarker.bringToFront();

            const route = allRoutesData.find(r => r.route_id === id);
            if(route) {
                renderDetailsPanel(route);
            }
        }

        // More useful confidence parsing
        function getConfColor(conf) {
            if(conf >= 0.85) return 'style="background:#dcfce7; color:#15803d"';
            if(conf >= 0.70) return 'style="background:#fef9c3; color:#a16207"';
            return 'style="background:#fee2e2; color:#b91c1c"';
        }
        function getConfText(conf) {
            const pct = Math.round(conf * 100);
            if(conf >= 0.85) return `High Certainty (${pct}%)`;
            if(conf >= 0.70) return `Medium Certainty (${pct}%)`;
            return `Low Certainty (${pct}%)`;
        }

        function renderDetailsPanel(route) {
            const hCont = document.getElementById('horizons-container');
            const iCont = document.getElementById('route-info-container');
            const etas = route.eta_minutes;
            const confs = route.confidence;
            
            hCont.innerHTML = `
                <div class="horizon-card v-1h">
                    <div class="card-top">
                        <span class="horizon-label" style="color:#2563EB">1 Hour Horizon</span>
                        <span class="conf-badge" ${getConfColor(confs['1_hour'])}>${getConfText(confs['1_hour'])}</span>
                    </div>
                    <div class="eta-val">${etas['1_hour'].estimate} min</div>
                    <div class="eta-range">Range: ${etas['1_hour'].lower_bound} – ${etas['1_hour'].upper_bound} min</div>
                </div>
                <div class="horizon-card v-2h">
                    <div class="card-top">
                        <span class="horizon-label" style="color:#D97706">2 Hour Horizon</span>
                        <span class="conf-badge" ${getConfColor(confs['2_hour'])}>${getConfText(confs['2_hour'])}</span>
                    </div>
                    <div class="eta-val">${etas['2_hour'].estimate} min</div>
                    <div class="eta-range">Range: ${etas['2_hour'].lower_bound} – ${etas['2_hour'].upper_bound} min</div>
                </div>
                <div class="horizon-card v-4h">
                    <div class="card-top">
                        <span class="horizon-label" style="color:#0D9488">4 Hour Horizon</span>
                        <span class="conf-badge" ${getConfColor(confs['4_hour'])}>${getConfText(confs['4_hour'])}</span>
                    </div>
                    <div class="eta-val">${etas['4_hour'].estimate} min</div>
                    <div class="eta-range">Range: ${etas['4_hour'].lower_bound} – ${etas['4_hour'].upper_bound} min</div>
                </div>
            `;

            const incHTML = route.meta.incident 
                ? `<div class="incident-box inc-warn">
                       <div class="inc-title"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg> Incidents Detected</div>
                       <div class="inc-desc"><b>${route.meta.incident_segments}</b> affected segments &middot; Expected Delay Severity: <b>${Math.round(route.meta.avg_incident_severity * 100)}%</b></div>
                   </div>`
                : `<div class="incident-box inc-clear">
                       <div class="inc-title"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"></polyline></svg> Clear Route</div>
                   </div>`;

            iCont.innerHTML = `
                <div class="info-grid">
                    <div class="info-item">
                        <div class="info-title">Distance</div>
                        <div class="info-val">${route.meta.distance_km} km</div>
                    </div>
                    <div class="info-item">
                        <div class="info-title">Graph Segments</div>
                        <div class="info-val">${route.meta.segments}</div>
                    </div>
                </div>
                ${incHTML}
            `;
            document.getElementById('selected-route-details').style.display = 'block';
        }
    </script>
</body>
</html>
